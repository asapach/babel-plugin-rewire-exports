name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: Babel ${{ matrix.babel }} / Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Babel 7 runs on older Node. The full suite runs here too: preset fixtures are
          # committed as Babel 8 output, with sibling *.babel7.js variants where Babel 7 differs.
          - babel: 7
            node: 18
          - babel: 7
            node: 20
          # Babel 8 requires Node ^22.18.0 || >=24.11.0.
          - babel: 8
            node: 22
          - babel: 8
            node: 24
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: yarn

      - name: Install dependencies (Babel 8)
        run: yarn install --frozen-lockfile

      - name: Downgrade to Babel 7
        if: matrix.babel == 7
        run: >-
          yarn add --dev
          @babel/core@^7 @babel/cli@^7 @babel/preset-env@^7
          @babel/preset-react@^7 @babel/preset-typescript@^7

      - name: Build
        run: yarn build

      - name: Test
        run: yarn test
